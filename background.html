<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Properties</title>

<style>

body{
    background-color:beige;
    background-image:url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");
    background-repeat:no-repeat;
    background-position:center;
    background-size:cover;
    background-attachment:fixed;
}

div{
    border-style:solid;
    border-width:1px;
    border-radius:10px;
    box-shadow:3px 3px 5px red;
    position:relative;
    top:10%;
    left:25%;
    height:100vh;
    width:500px;

    background-image:url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");
    background-repeat:no-repeat;
    background-size:cover;
    background-position:center;
}

h2{
    color:darkgreen;
    text-shadow:3px 3px 5px rgb(224, 44, 191);
    text-align:center;
    text-decoration:underline;
}

p{
    font-variant:small-caps;
    text-indent:1cm;
    padding:10px;
    text-align:justify;
    color:black;
}

button{
    display:flex;
    justify-content:center;
    align-items:center;
    line-height:2;
    border-radius:8px;
    box-shadow:2px 2px 5px rgb(10, 209, 73);
    margin:auto;
}

button:hover{
    background-color:deeppink;
}

img{
    border:1px solid black;
    position:relative;
    left:20%;
    margin:5px;
    border-radius:50%;
    box-shadow:3px 3px 7px rgb(231,104,125);
}

</style>
</head>

<body>

<div>

<img src="https://upload.wikimedia.org/wikipedia/commons/2/2d/Vijay_actor.jpg" width="150">

<h2>Thalapathy Vijay</h2>

<p>
Thalapathy Vijay is one of the most popular actors in Tamil cinema.
He is well known for his powerful acting, energetic dance moves,
and inspiring dialogues. Vijay has acted in many successful movies
and has a huge fan following across India and around the world.
</p>

<button type="submit">Read More</button>

</div>

</body>
</html>
